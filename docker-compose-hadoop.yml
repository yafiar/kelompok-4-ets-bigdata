# Docker Compose untuk Hadoop (HDFS)
# File ini mendefinisikan infrastruktur penyimpanan data terdistribusi.

# Network khusus agar kontainer bisa saling berkomunikasi menggunakan nama service
networks:
  bigdata_network:
    driver: bridge

services:
  # Namenode: "Otak" dari HDFS yang menyimpan metadata (lokasi file)
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: always
    ports:
      - 19870:9870  # Port untuk Web UI HDFS (bisa dibuka di browser) - mapped to 19870
      - 19000:9000  # Port untuk komunikasi internal HDFS - mapped to 19000
    env_file:
      - ./hadoop.env
    networks:
      - bigdata_network
    volumes:
      - hadoop_namenode:/hadoop/dfs/name

  # Datanode: "Otot" dari HDFS yang menyimpan data fisik/blok file
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    restart: always
    ports:
      - 19864:9864  # Port untuk Web UI Datanode - mapped to 19864
    env_file:
      - ./hadoop.env
    networks:
      - bigdata_network
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    depends_on:
      - namenode  # Datanode hanya jalan setelah Namenode siap

# Volume untuk persistensi data (agar data tidak hilang saat kontainer dihapus)
volumes:
  hadoop_namenode:
  hadoop_datanode:
